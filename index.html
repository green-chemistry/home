<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenChemistry - Accès Sécurisé</title>
    
    <!-- SDK Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary-color: #2e7d32;
            --secondary-color: #c8e6c9;
            --bg-gradient: linear-gradient(135deg, #e8f5e9, #c8e6c9);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--primary-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }

        /* --- STYLES LOGIN --- */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid var(--secondary-color);
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .error-msg {
            color: #d32f2f;
            font-size: 0.8rem;
            margin-top: 10px;
            display: none;
        }

        /* --- STYLES CONTENU PROTEGE (VOTRE DESIGN) --- */
        #protected-content {
            display: none; /* Caché par défaut */
        }

        img.logo {
            max-width: 160px;
            margin-bottom: 20px;
        }

        h1 { font-size: 2.5rem; margin: 0 0 10px; }
        p { font-size: 1.2rem; margin: 0; }

        .loader {
            margin: 30px auto;
            border: 6px solid #c8e6c9;
            border-top: 6px solid #2e7d32;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logout-btn {
            background: none;
            color: #2e7d32;
            text-decoration: underline;
            font-size: 0.8rem;
            cursor: pointer;
            border: none;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <!-- FORMULAIRE DE CONNEXION -->
    <div id="login-section" class="card">
        <span style="font-size: 40px;">🌱</span>
        <h2>GreenChemistry</h2>
        <p style="font-size: 0.9rem; margin-bottom: 20px;">Veuillez vous identifier</p>
        
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Mot de passe">
        <button id="loginBtn">Se connecter</button>
        <div id="error-message" class="error-msg">Identifiants incorrects.</div>
    </div>

    <!-- CONTENU PROTEGE (VOTRE PAGE COMING SOON) -->
    <div id="protected-content">
        <!-- Remplacez logo.png par votre vrai fichier sur GitHub -->
        <img src="logo.png" alt="GreenChemistry Logo" class="logo" onerror="this.src='https://via.placeholder.com/160x100?text=GreenChemistry'">
        
        <h1>We are GreenChemistry</h1>
        <p>Something sustainable and exciting is coming soon. 🌱</p>
        
        <div class="loader"></div>

        <button class="logout-btn" id="logoutBtn">Déconnexion</button>
    </div>

    <script>
        // 1. REMPLACEZ PAR VOS CLES SUPABASE
        const SUPABASE_URL = 'https://xjugxqntydvxqkdbqtkr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_RNZffI5jbh46TS6Ztb4WQQ_HqIgUI42';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Éléments
        const loginSection = document.getElementById('login-section');
        const protectedContent = document.getElementById('protected-content');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const errorMsg = document.getElementById('error-message');

        // FONCTION : Afficher le contenu selon l'état de connexion
        function updateUI(session) {
            if (session) {
                loginSection.style.display = 'none';
                protectedContent.style.display = 'block';
                document.body.style.background = "linear-gradient(135deg, #e8f5e9, #c8e6c9)";
            } else {
                loginSection.style.display = 'block';
                protectedContent.style.display = 'none';
            }
        }

        // Action de connexion
        loginBtn.addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorMsg.innerText = "Erreur : " + error.message;
                errorMsg.style.display = 'block';
            } else {
                updateUI(data.session);
            }
        });

        // Action de déconnexion
        logoutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.reload();
        });

        // Vérifier la session au démarrage
        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            updateUI(session);
        };
    </script>
</body>
</html>
