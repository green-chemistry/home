<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenChemistry - Vidéo Exclusive</title>
    
    <!-- SDK Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary-color: #2e7d32;
            --secondary-color: #c8e6c9;
            --bg-gradient: linear-gradient(135deg, #e8f5e9, #c8e6c9);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--primary-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .card {
            background: white;
            padd: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }

        /* --- STYLES LOGIN --- */
        input { width: 100%; padd: 12px; margin: 10px 0; border: 2px solid var(--secondary-color); border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .error-msg { color: #d32f2f; font-size: 0.8rem; margin-top: 10px; display: none; }

        /* --- STYLES CONTENU PROTEGE --- */
        #protected-content {
            display: none;
            width: 90%;
            max-width: 800px; /* Plus large pour la vidéo */
            padding: 20px;
        }

        img.logo { max-width: 140px; margin-bottom: 20px; }
        h1 { font-size: 2.2rem; margin: 0 0 10px; }
        
        /* Conteneur Vidéo Responsive (Ratio 16:9) */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Ratio 16:9 */
            height: 0;
            margin: 30px 0;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        .loader {
            margin: 20px auto;
            border: 5px solid #c8e6c9;
            border-top: 5px solid #2e7d32;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .logout-btn { background: none; color: #2e7d32; text-decoration: underline; font-size: 0.8rem; cursor: pointer; border: none; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- FORMULAIRE DE CONNEXION -->
    <div id="login-section" class="card">
        <img src="logo.png" alt="Logo" class="logo" onerror="this.src='https://via.placeholder.com/140x80?text=GreenChemistry'">
        <h2>GreenChemistry</h2>
        <p style="font-size: 0.9rem; margin-bottom: 20px;">Espace Membre Sécurisé</p>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Mot de passe">
        <button id="loginBtn">Se connecter</button>
        <div id="error-message" class="error-msg">Identifiants incorrects.</div>
    </div>

    <!-- CONTENU PROTEGE -->
    <div id="protected-content">
        <img src="logo.png" alt="Logo" class="logo" onerror="this.src='https://via.placeholder.com/140x80?text=GreenChemistry'">
        
        <h1>Bienvenue</h1>
        <p>Découvrez notre dernière présentation vidéo ci-dessous. </p>
        
        <!-- BLOC VIDÉO YOUTUBE -->
        <div class="video-container">
            <!-- REMPLACEZ l'ID 'VIDEO_ID' par le code de votre vidéo YouTube -->
            <iframe 
    src="https://www.youtube.com/embed/rGASK996bVY" 
    title="GreenChemistry Video" 
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
    allowfullscreen>
</iframe>
        </div>

        <div class="loader"></div>
        <p style="font-size: 0.9rem;">Coming Soon ..... Stay Tuned </p>

        <button class="logout-btn" id="logoutBtn">Déconnexion</button>
    </div>

    <script>
        // CONFIGURATION SUPABASE
        const SUPABASE_URL = 'https://xjugxqntydvxqkdbqtkr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_RNZffI5jbh46TS6Ztb4WQQ_HqIgUI42';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const loginSection = document.getElementById('login-section');
        const protectedContent = document.getElementById('protected-content');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const errorMsg = document.getElementById('error-message');

        function updateUI(session) {
            if (session) {
                loginSection.style.display = 'none';
                protectedContent.style.display = 'block';
            } else {
                loginSection.style.display = 'block';
                protectedContent.style.display = 'none';
            }
        }

        loginBtn.addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                errorMsg.innerText = error.message;
                errorMsg.style.display = 'block';
            } else {
                updateUI(data.session);
            }
        });

        logoutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            location.reload();
        });

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            updateUI(session);
        };
    </script>
</body>
</html>
